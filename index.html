<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <base href="/mytube-premium/">
    <title>MyTube - Ad-Free Premium</title>
    
    <!-- PWA / iOS Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#09090b">
    <link rel="apple-touch-icon" href="icon.png">

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <i class="fa-solid fa-play-circle gradient-text"></i>
            <span>MyTube</span>
        </div>
        <div class="search-container">
            <div class="search-input-wrapper">
                <input type="text" id="searchInput" placeholder="Search for ad-free videos..." autocomplete="off">
                <div class="search-suggestions" id="searchSuggestions"></div>
            </div>
            <button id="searchBtn"><i class="fa-solid fa-search"></i></button>
        </div>
        <div class="user-profile" id="settingsBtn" style="cursor: pointer;">
            <div class="avatar"><i class="fa-solid fa-cog"></i></div>
        </div>
    </nav>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <h2>Settings</h2>
            <p>To fix firewall issues, you can provide your own YouTube API Key.</p>
            <input type="text" id="apiKeyInput" placeholder="Enter YouTube Data API v3 Key..." style="width: 100%; padding: 10px; margin: 15px 0; background: var(--bg-main); border: 1px solid var(--glass-border); color: white; border-radius: 8px;">
            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button id="closeSettingsBtn" style="padding: 10px 15px; background: transparent; border: 1px solid var(--glass-border); color: white; border-radius: 8px; cursor: pointer;">Cancel</button>
                <button id="saveApiKeyBtn" style="padding: 10px 15px; background: var(--accent); border: none; color: white; border-radius: 8px; cursor: pointer;">Save & Reload</button>
            </div>
        </div>
    </div>

    <div class="layout">
        <aside class="sidebar">
            <a href="#" class="nav-item active" id="navHome"><i class="fa-solid fa-house"></i> Home</a>
            <a href="#" class="nav-item" id="navShorts"><i class="fa-solid fa-bolt"></i> Shorts</a>
            <a href="#" class="nav-item" id="navTrending"><i class="fa-solid fa-fire"></i> Trending</a>
        </aside>

        <main class="content" id="mainContent">
            <!-- Pull to Refresh Spinner -->
            <div id="ptrSpinner" class="ptr-spinner">
                <i class="fa-solid fa-arrow-rotate-right"></i>
            </div>
            
            <h2 id="sectionTitle">Trending Now</h2>
            <div id="loader" class="loader" style="display: none;"></div>
            <div class="video-grid" id="videoGrid">
                <!-- Videos will be injected here -->
            </div>
        </main>
    </div>

    <!-- Video Player Overlay -->
    <div class="player-overlay" id="playerOverlay">
        <div class="player-container">
            <div class="player-actions">
                <button class="action-btn" id="pipBtn" title="Picture in Picture"><i class="fa-solid fa-square-up-right"></i></button>
                <button class="action-btn close-player" id="closePlayer"><i class="fa-solid fa-times"></i></button>
            </div>
            <div class="video-wrapper">
                <!-- Native Video Player -->
            <video id="nativePlayer" playsinline controls></video>
            
            <!-- Fallback Iframe Player (Used if native stream fails) -->
            <iframe id="iframePlayer" style="display: none; width: 100%; height: 100%; border: none;" allowfullscreen allow="autoplay"></iframe>
            
            <div class="player-controls" id="playerLoader">
                    <i class="fa-solid fa-circle-notch fa-spin"></i> Loading High Quality Stream...
                </div>
            </div>
            <div class="video-info">
                <h2 id="playerTitle">Video Title</h2>
                <div class="channel-info">
                    <img id="playerChannelAvatar" src="" alt="Channel">
                    <span id="playerChannelName">Channel Name</span>
                    <span id="playerViews" class="views">0 views</span>
                </div>
                <div class="description-box collapsed" id="descBox" onclick="this.classList.toggle('collapsed')">
                    <p id="playerDescription"></p>
                    <span class="show-more-text">...more</span>
                </div>
                
                <!-- Related Videos Section -->
                <div class="related-videos-section" style="padding: 1.5rem; border-top: 1px solid var(--glass-border);">
                    <h3 style="margin-bottom: 1rem; font-size: 1.2rem;">Related Videos</h3>
                    <div id="relatedVideos" class="video-grid" style="grid-template-columns: 1fr;">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Mobile Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="#" class="bottom-nav-item active" id="mobileNavHome">
            <i class="fa-solid fa-house"></i>
            <span>Home</span>
        </a>
        <a href="#" class="bottom-nav-item" id="mobileNavShorts">
            <i class="fa-solid fa-bolt"></i>
            <span>Shorts</span>
        </a>
        <a href="#" class="bottom-nav-item" id="mobileNavTrending">
            <i class="fa-solid fa-fire"></i>
            <span>Trending</span>
        </a>
    </nav>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => console.log('SW registered'))
                    .catch(err => console.log('SW failed', err));
            });
        }
    </script>
</body>
</html>
